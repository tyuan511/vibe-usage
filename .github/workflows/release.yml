name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build DMG and publish GitHub Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Test
        run: swift test

      - name: Build DMG
        run: Scripts/package-dmg.sh release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: VibeUsage ${{ env.VERSION }}
          generate_release_notes: true
          files: .build/VibeUsage-${{ env.VERSION }}.dmg
