name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build DMG and publish GitHub Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Test
        run: swift test

      - name: Build DMG
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: Scripts/package-dmg.sh release

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ".build/VibeUsage-${VERSION}.dmg" \
            --title "VibeUsage ${VERSION}" \
            --generate-notes
