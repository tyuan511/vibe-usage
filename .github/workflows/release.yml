name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build DMG and publish GitHub Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Test
        run: swift test

      - name: Build DMG
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: Scripts/package-dmg.sh release

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          test -n "$SPARKLE_PRIVATE_KEY"
          updates_dir=".build/sparkle-updates"
          tools_dir=".build/artifacts/sparkle/Sparkle/bin"
          mkdir -p "$updates_dir"
          cp ".build/VibeUsage-${VERSION}.dmg" "$updates_dir/"
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$tools_dir/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            --link "https://github.com/${GITHUB_REPOSITORY}" \
            --maximum-versions 1 \
            --maximum-deltas 0 \
            -o "${GITHUB_WORKSPACE}/.build/appcast.xml" \
            "$updates_dir"
          test -s ".build/appcast.xml"
          xmllint --noout ".build/appcast.xml"
          grep -q 'sparkle:edSignature=' ".build/appcast.xml"
          grep -q 'sparkle-signatures:' ".build/appcast.xml"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ".build/VibeUsage-${VERSION}.dmg" \
            ".build/appcast.xml" \
            --title "VibeUsage ${VERSION}" \
            --generate-notes
