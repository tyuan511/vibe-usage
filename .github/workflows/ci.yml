name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test
        run: swift test

  preview:
    name: Regenerate share preview
    runs-on: macos-26
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build preview renderer
        run: swift build -c release --product VibeUsagePreviewRenderer

      - name: Render preview
        run: .build/release/VibeUsagePreviewRenderer docs/usage-share-preview.png --share-card

      - name: Commit preview if changed
        run: |
          if git diff --quiet docs/usage-share-preview.png; then
            echo "Preview unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/usage-share-preview.png
          git commit -m "Update share preview screenshot."
          git push
